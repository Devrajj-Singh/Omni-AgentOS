name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + import check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GROQ_API_KEY: "ci-dummy-key"
      TAVILY_API_KEY: "ci-dummy-key"
      ALLOWED_ORIGINS: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ruff (linter)
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Verify core modules import cleanly
        run: |
          python -c "import main"
          python -c "import agents.coder_agent"
          python -c "import agents.orchestrator"
          python -c "import routers.chat"
          python -c "import routers.approval"
          python -c "import routers.observability"
          python -c "import observability.logger"
          python -c "import execution.approval_store"

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
